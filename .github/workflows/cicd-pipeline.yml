name: Java Maven CI/CD Flow

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 22
      uses: actions/setup-java@v4
      with:
        java-version: '22'
        distribution: 'temurin'
        cache: maven

    - name: Build and Run Tests with Maven
      run: mvn clean test

  security-scan-codeql:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: 'java'

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
  
  merge-to-master:
    runs-on: ubuntu-latest
    needs: security-scan-codeql
    steps:
    - name: Merge Validation
      run: echo "Kode lolos build, test, dan security scan. Siap dirilis!"

  create-release:
    runs-on: ubuntu-latest
    needs: merge-to-master
    permissions:
      contents: write # Izin untuk membuat rilis di GitHub
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        body: "Rilis otomatis dari GitHub Actions CI/CD Pipeline Tugas."
        generate_release_notes: true